<script>
/* Parse "---" YAML-ish frontmatter into {meta, body} */
function parseFrontmatter(text){
  const m = text.match(/^\uFEFF?---\s*\n([\s\S]*?)\n---\s*\n?/);
  let meta = {}, body = text;
  if(m){
    body = text.slice(m[0].length);
    m[1].split('\n').forEach(line=>{
      const i = line.indexOf(':');
      if(i > -1){
        const key = line.slice(0,i).trim();
        let val = line.slice(i+1).trim().replace(/^["']|["']$/g,'');
        if(key) meta[key] = val;
      }
    });
  }
  return {meta, body};
}

function param(name){
  return new URLSearchParams(location.search).get(name);
}

async function loadPost(){
  const section = (param('section') || 'current').replace(/[^a-z0-9_-]/gi,'');
  const slug = (param('slug') || '').replace(/[^a-z0-9_.\u0980-\u09FF-]/gi,'');
  const bodyEl = document.getElementById('postBody');
  const metaEl = document.getElementById('postMeta');
  bodyEl.innerHTML = '<p class="loading">Turning the page… this site runs on JavaScript, so give it a moment.</p>';

  if(!slug){
    bodyEl.innerHTML = '<p class="loading">No post specified.</p>';
    return;
  }

  // section-aware back link
  const backMap = {
    current: ['index.html#writing-current', '← Back to current writing'],
    early:   ['index.html#writing-early',   '← Back to early writing'],
    music:   ['index.html#music',           '← Back to AI music']
  };
  const back = document.getElementById('backLink');
  const bm = backMap[section] || backMap.current;
  back.href = bm[0]; back.textContent = bm[1];

  try{
    const res = await fetch(`posts/${section}/${slug}.md`, {cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    const text = await res.text();
    const {meta, body} = parseFrontmatter(text);

    const bn = meta.lang === 'bn';
    bodyEl.className = 'post-body' + (bn ? ' bn' : '');

    const date = (meta.date || '').replace(/-/g,' · ');
    const kind = meta.type ? ` · ${meta.type}` : '';
    metaEl.textContent = date ? (date + kind) : '';

    bodyEl.innerHTML = marked.parse(body);
    if(meta.title) document.title = meta.title + ' — mahbub.se';
  }catch(err){
    bodyEl.innerHTML = '<p class="loading">' + (navigator.onLine
      ? 'This piece would not come off the shelf. Try refreshing the page.'
      : 'You appear to be offline, so this piece cannot be fetched right now. Reconnect and it will appear.') + '</p>';
  }
}
loadPost();
</script>
