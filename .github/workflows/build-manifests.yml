name: Build post manifests

# Whenever a Markdown post is added, edited, renamed or deleted under posts/,
# rebuild every posts/<stream>/_index.json from the files' front matter and
# commit the result back. You only ever push the .md file.

on:
  push:
    paths:
      - "posts/**/*.md"      # only .md changes trigger; manifest commits never do
  workflow_dispatch: {}       # lets you run it by hand from the Actions tab

permissions:
  contents: write             # required so the job can push the regenerated manifests

concurrency:
  group: build-manifests-${{ github.ref }}
  cancel-in-progress: false   # queue overlapping runs instead of cancelling mid-push

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Regenerate _index.json from front matter
        run: python3 .github/scripts/build_manifests.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/*/_index.json
          if git diff --cached --quiet; then
            echo "Manifests already in sync — nothing to commit."
          else
            git commit -m "chore: sync post manifests from front matter [auto]"
            git push || { git pull --rebase && git push; }
          fi
